<pl-question-panel>
  <script src="https://cdn.jsdelivr.net/npm/litegraph.js/build/litegraph.min.js"></script>

  <script>
    const initialGraph = {{{ params.initial_graph }}};
    const STORAGE_KEY = "{{{ params.storage_key }}}";
  </script>

  <script src="{{ options.client_files_course_url }}/blueprints/blueprintnode.js"> </script>

  {{This script segement loads all the nodetypes defined in nodetype.py into graph.js}}
  <script>
    {{{ params.node_registration_js }}}
  </script>
  
  {{defer statement ensures DOM has loaded before javascript; code doesn't work otherwise}}
  <script src="{{ options.client_files_course_url }}/blueprints/graph_setup.js" defer> </script>
  <script src="{{ options.client_files_course_url }}/blueprints/graph_serialise.js" defer> </script>
  <script src="{{ options.client_files_course_url }}/blueprints/graph_events.js" defer> </script>
  <script src="{{ options.client_files_course_url }}/blueprints/main.js" defer> </script>

  <h3>Blueprint Graph Prototype</h3>
  <pl-string-input answers-name="student_graph" size="80" display="block" allow-blank="true" ></pl-string-input>
  <div id="graph-container"
      style="width:100%; height:600px; background:#1e1e1e;">
  </div>

<button type="button" id="reset-graph" class="btn btn-secondary">
  Reset Graph
</button>

</pl-question-panel>
